<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VolleyFit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{background:#0f172a;color:white;text-align:center;font-family:Arial}
.page{display:none}
.active{display:block}
button{margin:5px;padding:10px;background:#22c55e;border:none}
</style>
</head>

<body>

<h1>VolleyFit</h1>

<div id="auth" class="page active">
<input id="email" placeholder="email"><br>
<input id="password" placeholder="password" type="password"><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="home" class="page">
<h2 id="user"></h2>
<p>XP: <span id="xp">0</span></p>
<p>Level: <span id="level">1</span></p>
<button onclick="gainXP()">+20 XP</button>
<button onclick="logout()">Logout</button>
</div>

<script>

// ONLY ONE SUPABASE
const supabase = window.supabase.createClient(
  "https://bxgvyrspkjxleekhhawh.supabase.co",
  "PUT_YOUR_REAL_KEY_HERE"
);

let user = null;
let xp = 0;
let level = 1;

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function signup(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabase.auth.signUp({ email, password });

  if(error) alert(error.message);
  else alert("Signup worked");
}

async function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){ alert(error.message); return; }

  user = data.user;

  await createUser();
  await loadUser();

  showPage('home');
}

async function createUser(){
  const { data } = await supabase.from('users').select('*').eq('id', user.id);

  if(data.length === 0){
    await supabase.from('users').insert([
      { id:user.id, username:user.email, xp:0, level:1 }
    ]);
  }
}

async function loadUser(){
  const { data } = await supabase.from('users').select('*').eq('id', user.id).single();

  xp = data.xp;
  level = data.level;

  document.getElementById('user').innerText = user.email;
  document.getElementById('xp').innerText = xp;
  document.getElementById('level').innerText = level;
}

async function gainXP(){
  xp += 20;
  if(xp >= 100){ xp -= 100; level++; }

  await supabase.from('users').update({ xp, level }).eq('id', user.id);

  document.getElementById('xp').innerText = xp;
  document.getElementById('level').innerText = level;
}

async function logout(){
  await supabase.auth.signOut();
  showPage('auth');
}

</script>

</body>
</html>
