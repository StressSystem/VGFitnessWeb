<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VolleyFit XP (Supabase)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
nav{background:#020617;padding:10px;display:flex;gap:15px;justify-content:center}
nav button{background:none;border:none;color:white;cursor:pointer}
.page{display:none;padding:20px;text-align:center}
.active{display:block}
.task,.post{background:#1e293b;margin:10px auto;padding:15px;border-radius:10px;max-width:500px}
button{padding:8px 12px;border:none;border-radius:8px;background:#22c55e;color:black;cursor:pointer;margin:5px}
input{padding:8px;border-radius:6px;border:none;margin:5px}
img{max-width:100%;border-radius:8px;margin-top:5px}
</style>
</head>
<body>

<nav>
<button onclick="showPage('login')">Login</button>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('social')">Social</button>
<button onclick="showPage('leaderboard')">Leaderboard</button>
</nav>

<div id="login" class="page active">
<h1>Login</h1>
<input id="username" placeholder="Username">
<button onclick="login()">Login</button>
</div>

<div id="home" class="page">
<h1>VolleyFit</h1>
<h2 id="userDisplay"></h2>
<h3>Level <span id="level">1</span></h3>
<p>XP: <span id="xp">0</span></p>
<h2>Tasks</h2>
<div id="tasks"></div>
</div>

<div id="social" class="page">
<h1>Feed</h1>
<input id="postText" placeholder="Post">
<input type="file" id="fileInput">
<button onclick="addPost()">Post</button>
<div id="feed"></div>
</div>

<div id="leaderboard" class="page">
<h1>Leaderboard</h1>
<div id="board"></div>
</div>

<script>
// 🔥 REPLACE THESE WITH YOUR VALUES
const supabase = window.supabase.createClient(
  "https://bxgvyrspkjxleekhhawh.supabase.co",
  "sb_publishable_3iDeTmy2nttM_YfjfMjHnA_TeIklQNo"
);

let user = "";
let xp = 0;
let level = 1;

const tasks = [
{name:"10 pushups",xp:10},
{name:"20 squats",xp:15},
{name:"50 passes",xp:20},
{name:"serve 20",xp:25},
{name:"spike 15",xp:30}
];

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// LOGIN (creates user if not exists)
async function login(){
user=document.getElementById("username").value;
if(!user) return;

let { data } = await supabase.from('users').select('*').eq('username', user);

if(data.length===0){
await supabase.from('users').insert([{username:user,xp:0,level:1}]);
xp=0;level=1;
}else{
xp=data[0].xp;level=data[0].level;
}

showPage('home');
updateUI();
renderTasks();
loadFeed();
loadLeaderboard();
}

function renderTasks(){
let div=document.getElementById("tasks");div.innerHTML="";
tasks.forEach((t,i)=>{
div.innerHTML+=`<div class='task'>${t.name} (${t.xp}xp)<br>
<button onclick="complete(${i})">Complete</button></div>`;
});
}

async function complete(i){
xp+=tasks[i].xp;
while(xp>=100){xp-=100;level++;}

await supabase.from('users').update({xp,level}).eq('username',user);
updateUI();
loadLeaderboard();
}

function updateUI(){
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level;
document.getElementById("userDisplay").innerText=user;
}

// 📸 POST WITH IMAGE
async function addPost(){
let text=document.getElementById("postText").value;
let file=document.getElementById("fileInput").files[0];

let imageUrl="";

if(file){
let fileName = Date.now()+"_"+file.name;
await supabase.storage.from('proofs').upload(fileName,file);

let { data } = supabase.storage.from('proofs').getPublicUrl(fileName);
imageUrl=data.publicUrl;
}

await supabase.from('posts').insert([{user,text,image_url:imageUrl}]);
loadFeed();
}

async function loadFeed(){
let { data } = await supabase.from('posts').select('*').order('created_at',{ascending:false});
let div=document.getElementById("feed");div.innerHTML="";

data.forEach(p=>{
div.innerHTML+=`<div class='post'><b>${p.user}</b>: ${p.text||""}${p.image_url?`<br><img src="${p.image_url}">`:""}</div>`;
});
}

async function loadLeaderboard(){
let { data } = await supabase.from('users').select('*').order('level',{ascending:false});
let div=document.getElementById("board");div.innerHTML="";

data.forEach(u=>{
div.innerHTML+=`<div class='task'>${u.username} - Level ${u.level}</div>`;
});
}
</script>

</body>
</html>
